<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Encouragement - 매일 아침 당신을 위한 응원</title>
    <meta name="google-site-verification" content="Rr-XyZ1234567890abcdefg" />

    <style>
        :root {
            --bg-day: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            --text-day: #2c3e50;
            --bg-night: linear-gradient(135deg, #1a1c2c 0%, #000000 100%);
            --text-night: #ecf0f1;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            transition: background 1.2s ease, color 1.2s ease;
            overflow: hidden;
            position: relative;
        }

        body.day-mode { background: var(--bg-day); color: var(--text-day); }
        body.night-mode { background: var(--bg-night); color: var(--text-night); }

        .lang-selector {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
        }

        .lang-selector select {
            padding: 8px 12px;
            border-radius: 15px;
            border: 1px solid rgba(128, 128, 128, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: inherit;
            font-size: 0.8rem;
            backdrop-filter: blur(10px);
            outline: none;
            cursor: pointer;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            width: 90%;
        }

        #digital-clock {
            font-size: 3rem;
            font-weight: 600; /* Semi-bold */
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #today-date {
            font-size: 1.5rem;
            font-weight: 500; /* Medium */
            margin-bottom: 60px;
            opacity: 0.8;
        }

        #compliment {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.6;
            word-break: keep-all;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 480px) {
            #digital-clock { font-size: 2.2rem; }
            #today-date { font-size: 1.2rem; }
            #compliment { font-size: 1.6rem; }
        }
    </style>
</head>
<body class="day-mode">

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh">简体中文</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="pt">Português</option>
            <option value="it">Italiano</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="vi">Tiếng Việt</option>
            <option value="th">ไทย</option>
            <option value="id">Bahasa Indonesia</option>
        </select>
    </div>

    <div class="container">
        <div id="digital-clock">00:00:00</div>
        <div id="today-date">0000. 00. 00</div>
        <div id="compliment">...</div>
    </div>

    <script>
        const languageData = {
            ko: ["오늘 당신의 걸음걸음마다 행운이 깃들길 바라요.", "당신은 충분히 잘해내고 있습니다.", "존재만으로도 소중한 당신을 응원합니다."],
            en: ["May luck follow every step you take today.", "You are doing a great job. Believe in yourself.", "You are precious just as you are."],
            ja: ["今日の一歩一歩に幸運が宿りますように。", "あなたは十分に頑張っています。", "あなたの存在そのものが宝物です。"],
            zh: ["愿好运伴随你今天的每一步。", "你做得很好，请相信自己。", "你的存在本身就是一种美好。"],
            es: ["Que la suerte acompañe cada paso que des hoy.", "Estás haciendo un gran trabajo.", "Eres una persona valiosa tal como eres."],
            fr: ["Que la chance accompagne chacun de vos pas aujourd'hui.", "Vous faites du bon travail.", "Vous êtes précieux tel que vous êtes."],
            de: ["Möge das Glück Sie heute auf jedem Schritt begleiten.", "Sie machen einen tollen Job.", "Du bist wertvoll, so wie du bist."],
            pt: ["Que a sorte acompanhe cada passo que você der hoje.", "Você está fazendo um ótimo trabalho.", "Você é precioso do jeito que é."],
            it: ["Che la fortuna accompagni ogni tuo passo oggi.", "Stai facendo un ottimo lavoro.", "Sei prezioso così come sei."],
            ru: ["Пусть удача сопутствует каждому вашему шагу сегодня.", "Вы отлично справляетесь.", "Вы драгоценны такие, какие вы есть."],
            ar: ["أتمنى أن يحالفك الحظ في كل خطوة تخطوها اليوم.", "أنت تبلي بلاءً حسناً. آمن بنفسك.", "أنت ثمين كما أنت."],
            hi: ["आज आपके हर कदम पर भाग्य आपका साथ दे।", "आप बहुत अच्छा काम कर रहे हैं।", "आप जैसे हैं वैसे ही अनमोल हैं।"],
            vi: ["Chúc may mắn theo mỗi bước chân của bạn hôm nay.", "Bạn đang làm rất tốt. Hãy tin vào chính mình.", "Bạn rất quý giá theo cách của riêng mình."],
            th: ["ขอให้ความโชคดีติดตามคุณไปในทุกย่างก้าวในวันนี้", "คุณทำได้ดีมาก จงเชื่อมั่นในตัวเอง", "คุณมีค่าในแบบที่คุณเป็น"],
            id: ["Semoga keberuntungan menyertai setiap langkahmu hari ini.", "Kamu melakukan pekerjaan yang hebat.", "Kamu berharga apa adanya."]
        };

        const selectEl = document.getElementById('language-select');

        // 초기 언어 설정
        let browserLang = navigator.language.substring(0, 2);
        let initialLang = localStorage.getItem('userLang') || (languageData[browserLang] ? browserLang : 'en');
        
        currentLang = initialLang;
        selectEl.value = currentLang;

        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            
            // 시계 & 날짜 (중간 볼드)
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}:${s}`;
            document.getElementById('today-date').innerText = now.toLocaleDateString(currentLang === 'ko' ? 'ko-KR' : 'en-US', {year:'numeric', month:'2-digit', day:'2-digit'});

            // 낮밤 배경 전환
            document.body.className = (now.getHours() >= 6 && now.getHours() < 18) ? 'day-mode' : 'night-mode';

            // 문구 갱신 (오전 6시 기준)
            let displayDate = new Date(now);
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            const dateSeed = (displayDate.getFullYear() * 10000) + ((displayDate.getMonth() + 1) * 100) + displayDate.getDate();
            
            const currentList = languageData[currentLang];
            document.getElementById('compliment').innerText = currentList[dateSeed % currentList.length];
            
            // 아랍어(ar) 처리 (우측 정렬)
            document.getElementById('compliment').style.direction = (currentLang === 'ar' ? 'rtl' : 'ltr');
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
