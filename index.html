<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom - Natural Symphony</title>
    
    <meta name="google-site-verification" content="Lv8vn0m8j5zG1dkw8WTzH57VCQofxCsoT_sMCJ8QI_c" />
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            transition: color 1s ease;
        }

        /* 1. 배경 사진 영역 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1.5s ease-in-out;
        }

        .background::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.1); 
            transition: background 1.5s ease-in-out;
        }

        body.night-mode .background::before {
            background: rgba(0, 0, 0, 0.4); 
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            box-sizing: border-box;
            text-align: center;
            color: #ffffff;
            text-shadow: 0px 2px 15px rgba(0, 0, 0, 0.4);
        }

        #top-message {
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            opacity: 0.9;
        }

        .center-quote {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 650px;
            position: relative;
        }

        #compliment {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.4;
            word-break: keep-all;
            margin-bottom: 15px;
        }

        #author {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 400;
        }

        /* 하단 영역 설정 */
        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        /* 방문자 카운트 스타일 */
        .visitor-counter {
            font-size: 0.8rem;
            font-weight: 300;
            opacity: 0.6;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #digital-clock {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        #today-date {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 5px;
        }

        body.night-mode #compliment {
            color: #fffde7; 
        }

        .lang-selector {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 100;
        }

        .lang-selector select {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            outline: none;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            #compliment { font-size: 1.6rem; }
            #digital-clock { font-size: 3rem; }
        }
    </style>
</head>
<body class="day-mode">
    <div id="main-background" class="background"></div>

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KR</option>
            <option value="en">EN</option>
            <option value="ja">JP</option>
            <option value="zh">CN</option>
        </select>
    </div>
