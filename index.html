<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom - Fresh Nature</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        /* 1. 싱그러운 산과 하늘 배경 사진 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 산과 푸른 들판이 있는 싱그러운 이미지 */
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* 배경을 살짝 밝게 만들어주는 오버레이 */
        .background::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1); 
        }

        /* 전체 컨테이너 */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            box-sizing: border-box;
            text-align: center;
            color: #ffffff;
            /* 사진 위 가독성을 위한 전체 텍스트 그림자 */
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* 상단 메시지: 70% 축소 및 얇은 폰트 */
        #top-message {
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            opacity: 0.9;
        }

        /* 중앙 시계 영역: 풍경 중간에 걸쳐 있는 느낌 */
        .clock-section {
            margin-top: -5vh;
        }

        #digital-clock {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        #today-date {
            font-size: 1.2rem;
            font-weight: 400;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* 하단 명언 박스: 발랄한 노란색 포인트 */
        .quote-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 90%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        #compliment {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff9c4; /* 싱그러운 느낌의 연노랑 */
            margin-bottom: 10px;
            word-break: keep-all;
        }

        #author {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 언어 선택기 */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-selector select {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            padding: 5px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            #digital-clock { font-size: 3.5rem; }
            #compliment { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KR</option>
            <option value="en">EN</option>
            <option value="ja">JP</option>
            <option value="zh">CN</option>
        </select>
    </div>

    <div class="container">
        <div id="top-message">당신은 매일 소중합니다</div>

        <div class="clock-section">
            <div id="digital-clock">00:00:00</div>
            <div id="today-date">2026. 03. 31</div>
        </div>

        <div class="quote-card">
            <div id="compliment">새로운 하루가 시작되었습니다.</div>
            <div id="author">- 오늘의 응원</div>
        </div>
    </div>

    <script>
        const topMessages = {
            ko: "당신은 매일 소중합니다",
            en: "YOU ARE PRECIOUS EVERY DAY",
            ja: "あなたは毎日大切です",
            zh: "每一天的你都很珍贵"
        };

        const languageData = {
            ko: [
                {q: "가장 빛나는 별은 어두운 밤에 보인다.", a: "고전 격언"},
                {q: "행복은 여정이지 목적지가 아니다.", a: "알프레드 디 수자"},
                {q: "오늘의 햇살은 당신을 위해 빛납니다.", a: "오늘의 응원"}
            ],
            en: [
                {q: "Stars shine brightest in the dark.", a: "Proverb"},
                {q: "Happiness is a journey, not a destination.", a: "Alfred D'Souza"}
            ]
        };

        const selectEl = document.getElementById('language-select');
        let currentLang = localStorage.getItem('userLang') || 'ko';
        selectEl.value = currentLang;

        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            
            // 상단 메시지
            document.getElementById('top-message').innerText = topMessages[currentLang] || topMessages['en'];
            
            // 시계 업데이트 (초 단위까지!)
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}:${s}`;
            
            // 날짜
            document.getElementById('today-date').innerText = now.getFullYear() + ". " + 
                                                              String(now.getMonth()+1).padStart(2, '0') + ". " + 
                                                              String(now.getDate()).padStart(2, '0');

            // 명언 로직
            const dateSeed = now.getDate();
            const list = languageData[currentLang] || languageData['en'];
            const item = list[dateSeed % list.length];
            
            document.getElementById('compliment').innerText = item.q;
            document.getElementById('author').innerText = item.a;
        }

        // 초 단위 표시를 위해 1초마다 실행
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
