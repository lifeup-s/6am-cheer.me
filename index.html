<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom - Moments of Light</title>
    <meta name="google-site-verification" content="Lv8vn0m8j5zG1dkw8WTzH57VCQofxCsoT_sMCJ8QI_c" />
    <style>
        /* 모던한 폰트 불러오기 (Pretendard) */
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

        :root {
            --bg-day: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-day: #1a1a1a;
            --bg-night: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --text-night: #f8fafc;
            --accent: #a29bfe; 
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 상단과 중앙 분리 */
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            transition: background 1.5s ease, color 1.5s ease;
            overflow: hidden;
            position: relative;
        }

        body.day-mode { background: var(--bg-day); color: var(--text-day); }
        body.night-mode { background: var(--bg-night); color: var(--text-night); }

        /* 언어 선택기 - 더 심플하게 */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .lang-selector select {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(128, 128, 128, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: inherit;
            backdrop-filter: blur(10px);
            outline: none;
            transition: 0.3s;
        }

        /* 1. 상단 메시지: 더 위로 배치 */
        #top-message {
            margin-top: 40px;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.2em; /* 자간을 넓혀 모던함 강조 */
            text-align: center;
            opacity: 0.6;
            text-transform: uppercase;
        }

        /* 중앙 컨테이너: 간격 최적화 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            text-align: center;
        }

        /* 2. 시간 스타일: 세련되고 얇은 볼드 */
        #digital-clock {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -0.05em; /* 숫자는 붙여야 모던함 */
            margin-bottom: 0; /* 간격 대폭 축소 */
            line-height: 1;
        }

        #today-date {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 40px; /* 시간과 명언 사이의 적절한 거리 */
            opacity: 0.5;
            letter-spacing: 0.1em;
        }

        /* 3. 명언과 출처 간격 축소 */
        .quote-container {
            max-width: 700px;
        }

        #compliment {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.4;
            word-break: keep-all;
            margin-bottom: 10px; /* 명언과 출처 사이 아주 좁게 */
        }

        #author {
            font-size: 0.9rem;
            font-weight: 300;
            opacity: 0.4;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            #digital-clock { font-size: 3.5rem; }
            #compliment { font-size: 1.4rem; }
            #top-message { margin-top: 60px; font-size: 0.8rem; }
        }
    </style>
</head>
<body class="day-mode">

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KR</option>
            <option value="en">EN</option>
            <option value="ja">JP</option>
            <option value="zh">CN</option>
            <option value="fr">FR</option>
            <option value="de">DE</option>
            <option value="es">ES</option>
        </select>
    </div>

    <div id="top-message">YOU ARE PRECIOUS EVERY DAY</div>

    <div class="main-content">
        <div id="digital-clock">00:00</div>
        <div id="today-date">2026. 03. 31</div>
        
        <div class="quote-container">
            <div id="compliment">Loading Wisdom...</div>
            <div id="author"></div>
        </div>
    </div>

    <script>
        const topMessages = {
            ko: "당신은 매일 소중합니다",
            en: "YOU ARE PRECIOUS EVERY DAY",
            ja: "あなたは毎日大切です",
            zh: "每一天的你都很珍贵",
            fr: "TU ES PRÉCIEUX CHAQUE JOUR",
            de: "DU BIST JEDEN TAG WERTVOLL",
            es: "ERES VALIOSO CADA DÍA"
        };

        const languageData = {
            ko: [
                {q: "가장 빛나는 별은 어두운 밤에 보인다.", a: "고전 격언"},
                {q: "행복은 여정이지 목적지가 아니다.", a: "알프레드 디 수자"},
                {q: "어둠 속에서도 빛을 발견하는 법을 배워라.", a: "아리스토텔레스"}
            ],
            en: [
                {q: "Stars shine brightest in the dark.", a: "Proverb"},
                {q: "Happiness is a journey, not a destination.", a: "Alfred D'Souza"},
                {q: "Find light in your darkest moments.", a: "Aristotle"}
            ],
            ja: [
                {q: "最も暗い夜に、星は最も輝く。", a: "格言"},
                {q: "幸せは旅路であり、目的地ではない。", a: "アルフレッド・D・スーザ"}
            ]
            // ... 다른 언어도 동일 구조로 추가
        };

        const selectEl = document.getElementById('language-select');
        let currentLang = localStorage.getItem('userLang') || 
                          (languageData[navigator.language.substring(0, 2)] ? navigator.language.substring(0, 2) : 'en');
        
        selectEl.value = currentLang;

        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            
            // 1. 상단 메시지
            document.getElementById('top-message').innerText = topMessages[currentLang] || topMessages['en'];
            
            // 2. 시간 (초 제외, 시:분만 표시하여 모던함 강조)
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}`;
            
            // 3. 날짜
            document.getElementById('today-date').innerText = now.toLocaleDateString('en-GB').replace(/\//g, '. ');

            // 4. 낮밤 모드 (6시~18시)
            document.body.className = (now.getHours() >= 6 && now.getHours() < 18) ? 'day-mode' : 'night-mode';

            // 5. 명언 (매일 갱신)
            let displayDate = new Date(now);
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            const dateSeed = (displayDate.getFullYear() * 10000) + ((displayDate.getMonth() + 1) * 100) + displayDate.getDate();
            
            const list = languageData[currentLang] || languageData['en'];
            const item = list[dateSeed % list.length];
            
            document.getElementById('compliment').innerText = item.q;
            document.getElementById('author').innerText = item.a;
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
