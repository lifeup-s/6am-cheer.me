    <style>
        :root {
            --bg-day: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            --text-day: #2c3e50;
            --bg-night: linear-gradient(135deg, #1a1c2c 0%, #000000 100%);
            --text-night: #ecf0f1;
            --point-purple: #a29bfe; 
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            transition: background 1s ease, color 1s ease;
            overflow: hidden;
            position: relative;
        }

        body.day-mode { background: var(--bg-day); color: var(--text-day); }
        body.night-mode { background: var(--bg-night); color: var(--text-night); }

        /* 언어 선택기 */
        .lang-selector {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
        }

        .lang-selector select {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.5s ease;
        }

        body.day-mode .lang-selector select {
            background-color: #ffffff;
            color: #4834d4;
            border: 2px solid var(--point-purple);
        }
