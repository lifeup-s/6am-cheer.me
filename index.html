<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom - Natural Symphony</title>
    
    <meta name="google-site-verification" content="Lv8vn0m8j5zG1dkw8WTzH57VCQofxCsoT_sMCJ8QI_c" />
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            transition: color 1s ease; /* 텍스트 색상 부드럽게 전환 */
        }

        /* 1. 배경 사진 영역 및 시간별 이미지 설정 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1.5s ease-in-out; /* 배경 이미지 부드럽게 전환 */
        }

        /* 기본 오버레이 (가독성 확보) */
        .background::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.1); 
            transition: background 1.5s ease-in-out;
        }

        /* 💡 밤 모드일 때 배경 오버레이를 더 어둡게 처리 */
        body.night-mode .background::before {
            background: rgba(0, 0, 0, 0.4); 
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            box-sizing: border-box;
            text-align: center;
            color: #ffffff; /* 기본 하얀색 텍스트 */
            text-shadow: 0px 2px 15px rgba(0, 0, 0, 0.4);
        }

        /* 상단: 당신은 매일 소중합니다 (70% 축소 유지) */
        #top-message {
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            opacity: 0.9;
        }

        /* 중앙: 응원 메시지 (정가운데 배치) */
        .center-quote {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 650px;
            position: relative;
        }

        #compliment {
            font-size: 2.2rem; /* 메시지 강조 */
            font-weight: 900;
            line-height: 1.4;
            word-break: keep-all;
            margin-bottom: 15px;
        }

        #author {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 400;
        }

        /* 하단: 시간과 날짜 */
        .bottom-clock {
            margin-bottom: 20px;
        }

        #digital-clock {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        #today-date {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* 💡 밤 모드 타이포그래피 포인트: 명언 색상을 연노랑색으로 변경 */
        body.night-mode #compliment {
            color: #fffde7; /* 싱그러운 연노랑 */
        }

        .lang-selector {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 100;
        }

        .lang-selector select {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            outline: none;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            #compliment { font-size: 1.6rem; }
            #digital-clock { font-size: 3rem; }
        }
    </style>
</head>
<body class="day-mode"> <div id="main-background" class="background"></div>

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KR</option>
            <option value="en">EN</option>
            <option value="ja">JP</option>
            <option value="zh">CN</option>
        </select>
    </div>

    <div class="container">
        <div id="top-message">당신은 매일 소중합니다</div>

        <div class="center-quote">
            <div id="compliment">Loading Wisdom...</div>
            <div id="author"></div>
        </div>

        <div class="bottom-clock">
            <div id="digital-clock">00:00:00</div>
            <div id="today-date">2026. 03. 31</div>
        </div>
    </div>

    <script>
        const topMessages = {
            ko: "당신은 매일 소중합니다",
            en: "YOU ARE PRECIOUS EVERY DAY",
            ja: "あなたは毎日大切です",
            zh: "每一天的你都很珍贵"
        };

        const languageData = {
            ko: [
                {q: "가장 빛나는 별은 어두운 밤에 보인다.", a: "고전 격언"},
                {q: "행복은 여정이지 목적지가 아니다.", a: "알프레드 디 수자"},
                {q: "오늘의 햇살은 오직 당신을 위해 준비되었습니다.", a: "오늘의 응원"}
            ],
            en: [
                {q: "Stars shine brightest in the dark.", a: "Proverb"},
                {q: "Happiness is a journey, not a destination.", a: "Alfred D'Souza"}
            ],
            ja: [
                {q: "最も暗い夜に、星は最も輝く。", a: "格言"},
                {q: "幸せは旅路であり、目的地ではない。", a: "アルフレッド・D・スーザ"}
            ],
            zh: [
                {q: "最亮的星出现在最暗의夜里。", a: "格言"},
                {q: "幸福是旅程，而非终点。", a: "阿尔弗雷德·德索萨"}
            ]
        };

        const selectEl = document.getElementById('language-select');
        let currentLang = localStorage.getItem('userLang') || 
                          (languageData[navigator.language.substring(0, 2)] ? navigator.language.substring(0, 2) : 'ko');
        selectEl.value = currentLang;

        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            
            // 1. 낮/밤 시간 판단 (오전 6시 ~ 오후 6시 기준)
            const hours = now.getHours();
            const isDay = hours >= 6 && hours < 18;
            
            const bodyEl = document.body;
            const bgEl = document.getElementById('main-background');
            
            // 2. 시간별 배경 이미지 및 클래스 설정
            if (isDay) {
                // 낮 시간 배경 (싱그러운 산과 호수)
                bgEl.style.backgroundImage = "url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop')";
                bodyEl.className = 'day-mode';
            } else {
                // 밤 시간 배경 (차분한 은하수 밤하늘)
                bgEl.style.backgroundImage = "url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071&auto=format&fit=crop')";
                bodyEl.className = 'night-mode';
            }
            
            // 상단 메시지
            document.getElementById('top-message').innerText = topMessages[currentLang] || topMessages['en'];
            
            // 시계 (초 단위 포함)
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}:${s}`;
            
            // 날짜
            document.getElementById('today-date').innerText = now.getFullYear() + ". " + 
                                                              String(now.getMonth()+1).padStart(2, '0') + ". " + 
                                                              String(now.getDate()).padStart(2, '0');

            // 명언 로직
            let displayDate = new Date(now);
            // 밤 12시부터 새벽 6시까지는 이전 날짜의 격언을 유지하여 차분한 분위기 유지
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            
            const dateSeed = (displayDate.getFullYear() * 10000) + ((displayDate.getMonth() + 1) * 100) + displayDate.getDate();
            
            const list = languageData[currentLang] || languageData['en'];
            const item = list[dateSeed % list.length];
            
            document.getElementById('compliment').innerText = item.q;
            document.getElementById('author').innerText = `- ${item.a}`;
        }

        setInterval(updateUI, 1000); // 1초 간격 업데이트
        updateUI();
    </script>
</body>
</html>
