<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Encouragement</title>
    <meta name="google-site-verification" content="인증코드를_여기에_넣으세요" />

    <style>
        :root {
            --bg-day: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            --text-day: #2c3e50;
            --bg-night: linear-gradient(135deg, #1a1c2c 0%, #000000 100%);
            --text-night: #ecf0f1;
            --point-purple: #a29bfe; 
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            transition: background 1s ease, color 1s ease;
            overflow: hidden;
            position: relative;
        }

        body.day-mode { background: var(--bg-day); color: var(--text-day); }
        body.night-mode { background: var(--bg-night); color: var(--text-night); }

        /* 언어 선택기 디자인 보완 */
        .lang-selector {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
        }

        .lang-selector select {
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid var(--point-purple);
            background: #ffffff; /* 가독성을 위해 배경을 흰색으로 고정 */
            color: #4834d4; /* 글자색 진한 보라색 고정 */
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            outline: none;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 850px;
            width: 90%;
        }

        /* 시간과 날짜: 중간 볼드 스타일 */
        #digital-clock {
            font-size: 3.2rem;
            font-weight: 600; 
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #today-date {
            font-size: 1.6rem;
            font-weight: 500; 
            margin-bottom: 60px;
            opacity: 0.8;
        }

        #compliment {
            font-size: 2.3rem;
            font-weight: 700;
            line-height: 1.7;
            word-break: keep-all;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 480px) {
            #digital-clock { font-size: 2.2rem; }
            #today-date { font-size: 1.2rem; }
            #compliment { font-size: 1.7rem; }
            .lang-selector { top: 15px; right: 15px; }
        }
    </style>
</head>
<body class="day-mode">

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KOREAN 🇰🇷</option>
            <option value="en">ENGLISH 🇺🇸</option>
            <option value="ja">JAPANESE 🇯🇵</option>
            <option value="zh">CHINESE 🇨🇳</option>
            <option value="es">SPANISH 🇪🇸</option>
            <option value="fr">FRENCH 🇫🇷</option>
            <option value="de">GERMAN 🇩🇪</option>
            <option value="pt">PORTUGUESE 🇵🇹</option>
            <option value="it">ITALIAN 🇮🇹</option>
            <option value="ru">RUSSIAN 🇷🇺</option>
            <option value="ar">ARABIC 🇸🇦</option>
            <option value="hi">HINDI 🇮🇳</option>
            <option value="vi">VIETNAMESE 🇻🇳</option>
            <option value="th">THAI 🇹🇭</option>
            <option value="id">INDONESIAN 🇮🇩</option>
        </select>
    </div>

    <div class="container">
        <div id="digital-clock">00:00:00</div>
        <div id="today-date">0000. 00. 00</div>
        <div id="compliment">...</div>
    </div>

    <script>
        const languageData = {
            ko: ["오늘 당신의 걸음걸음마다 행운이 깃들길 바라요.", "당신은 충분히 잘해내고 있습니다.", "존재만으로도 소중한 당신을 응원합니다."],
            en: ["May luck follow every step you take today.", "You are doing a great job. Believe in yourself.", "You are precious just as you are."],
            ja: ["今日の一歩一歩に幸運が宿りますように。", "あなたは十分に頑張っています。", "あなたの存在そのものが宝物です。"],
            zh: ["愿好运伴随你今天的每一步。", "你做得很好，请相信自己。", "你的存在本身就是一种美好。"],
            es: ["Que la suerte acompañe cada paso que des hoy.", "Estás haciendo un gran trabajo.", "Eres una persona valiosa tal como eres."],
            fr: ["Que la chance accompagne chacun de vos pas aujourd'hui.", "Vous faites du bon travail.", "Vous êtes précieux tel que vous êtes."],
            de: ["Möge das Glück Sie heute auf jedem Schritt begleiten.", "Sie machen einen tollen Job.", "Du bist wertvoll, so wie du bist."],
            pt: ["Que a sorte acompanhe cada passo que você der hoje.", "Você está fazendo um ótimo trabalho.", "Você é precioso do jeito que é."],
            it: ["Che la fortuna accompagni ogni tuo passo oggi.", "Stai facendo un ottimo lavoro.", "Sei prezioso così come sei."],
            ru: ["Пусть удача сопутствует каждому вашему шагу сегодня.", "Вы отлично справляетесь.", "Вы дра고ценны такие, какие вы есть."],
            ar: ["أتمنى أن يحالفك الحظ في كل خطوة تخطوها اليوم.", "أنت تبلي بلاءً حسناً. آمن بنفسك.", "أنت ثمين كما أنت."],
            hi: ["오늘 하루 당신의 모든 발걸음에 행운이 있기를 바랍니다.", "당신은 훌륭하게 해내고 있습니다.", "당신은 있는 그대로 소중합니다."],
            vi: ["Chúc may mắn theo mỗi bước chân của bạn hôm nay.", "Bạn đang làm rất tốt. Hãy tin vào chính mình.", "Bạn rất quý giá theo cách của riêng mình."],
            th: ["ขอให้ความโชคดีติดตามคุณไปในทุกย่างก้าวในวันนี้", "คุณทำได้ดีมาก จงเชื่อมั่นในตัวเอง", "คุณมีค่าในแบบที่คุณเป็น"],
            id: ["Semoga keberuntungan menyertai setiap langkahmu hari ini.", "Kamu melakukan pekerjaan yang hebat.", "Kamu berharga apa adanya."]
        };

        const selectEl = document.getElementById('language-select');
        
        // 초기 언어 설정 (localStorage -> 브라우저 감지 -> 영어 순)
        let savedLang = localStorage.getItem('userLang');
        let browserLang = navigator.language.substring(0, 2);
        let currentLang = savedLang || (languageData[browserLang] ? browserLang : 'en');
        
        selectEl.value = currentLang;

        // 언어 변경 이벤트
        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            
            // 1. 시계 업데이트
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}:${s}`;
            
            // 2. 날짜 업데이트 (언어 설정 반영)
            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit' };
            document.getElementById('today-date').innerText = now.toLocaleDateString(currentLang === 'ko' ? 'ko-KR' : 'en-US', dateOptions);

            // 3. 낮밤 배경 전환
            document.body.className = (now.getHours() >= 6 && now.getHours() < 18) ? 'day-mode' : 'night-mode';

            // 4. 문구 갱신 (오전 6시 기준)
            let displayDate = new Date(now);
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            const dateSeed = (displayDate.getFullYear() * 10000) + ((displayDate.getMonth() + 1) * 100) + displayDate.getDate();
            
            const currentList = languageData[currentLang] || languageData['en'];
            const index = dateSeed % currentList.length;
            document.getElementById('compliment').innerText = currentList[index];

            // 아랍어 우측 정렬 처리
            document.getElementById('compliment').style.direction = (currentLang === 'ar' ? 'rtl' : 'ltr');
        }

        // 초기 실행 및 인터벌 설정
        updateUI();
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
