<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Daily Encouragement - 매일 아침 당신을 위한 응원</title>
    <meta name="description" content="매일 아침 6시, 당신의 하루를 응원하는 따뜻한 문장이 배달됩니다. Every morning at 6 AM, a warm message for your day.">
    
    <meta name="google-site-verification" content="여기에_구글이_준_코드를_넣으세요" />

    <style>
        :root {
            --bg-day: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            --text-day: #2c3e50;
            --bg-night: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --text-night: #ecf0f1;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            transition: background 1s ease, color 1s ease;
        }

        body.day-mode { background: var(--bg-day); color: var(--text-day); }
        body.night-mode { background: var(--bg-night); color: var(--text-night); }

        .container { text-align: center; padding: 20px; max-width: 700px; }
        
        #digital-clock {
            font-size: 1.1rem;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        #today-date {
            font-size: 0.9rem;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        #compliment {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.6;
            word-break: keep-all;
        }
    </style>
</head>
<body class="day-mode">

    <div class="container">
        <div id="digital-clock">00:00:00</div>
        <div id="today-date">0000. 00. 00</div>
        <div id="compliment">...</div>
    </div>

    <script>
        // 언어별 문구 데이터
        const languageData = {
            ko: [
                "오늘 당신의 걸음걸음마다 행운이 깃들길 바라요.",
                "당신은 충분히 잘해내고 있습니다. 스스로를 믿어주세요.",
                "세상에 단 하나뿐인 당신의 존재는 그 자체로 소중합니다.",
                "오늘 하루, 당신에게 가장 다정한 사람이 당신 자신이길."
                // ... (기존 100개 한국어 문구들)
            ],
            en: [
                "May good luck follow every step you take today.",
                "You are doing well enough. Please believe in yourself.",
                "You are a unique and precious soul in this world.",
                "I hope you are the kindest person to yourself today."
                // ... (영어 문구 추가)
            ]
        };

        function updateUI() {
            const now = new Date();
            
            // 1. 시계 & 날짜
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}:${s}`;
            
            const y = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            document.getElementById('today-date').innerText = `${y}. ${mm}. ${d}`;

            // 2. 낮밤 배경 (06:00~18:00 낮)
            if (now.getHours() >= 6 && now.getHours() < 18) {
                document.body.className = 'day-mode';
            } else {
                document.body.className = 'night-mode';
            }

            // 3. 언어 감지 및 문구 설정
            const userLang = navigator.language.substring(0, 2); // 'ko', 'en' 등 추출
            const selectedLang = languageData[userLang] ? userLang : 'en'; // 지원 안하면 영어 기본
            const currentList = languageData[selectedLang];

            // 4. 오전 6시 기준 갱신 로직
            let displayDate = new Date(now);
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            
            const dateSeed = (displayDate.getFullYear() * 10000) + 
                             ((displayDate.getMonth() + 1) * 100) + 
                             displayDate.getDate();
            
            const index = dateSeed % currentList.length;
            document.getElementById('compliment').innerText = currentList[index];
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
