<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Encouragement</title>
    <meta name="google-site-verification" content="Rr-XyZ1234567890abcdefg" />

    <style>
        :root {
            --bg-day: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            --text-day: #2c3e50;
            --bg-night: linear-gradient(135deg, #1a1c2c 0%, #000000 100%);
            --text-night: #ecf0f1;
            /* 연보라 포인트 컬러 */
            --point-purple: #a29bfe; 
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            transition: background 1.2s ease, color 1.2s ease;
            overflow: hidden;
            position: relative;
        }

        body.day-mode { background: var(--bg-day); color: var(--text-day); }
        body.night-mode { background: var(--bg-night); color: var(--text-night); }

        /* 언어 선택기 디자인 개선 */
        .lang-selector {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
        }

        .lang-selector select {
            padding: 10px 18px;
            border-radius: 25px;
            /* 연보라색 테두리와 그림자 */
            border: 2px solid var(--point-purple);
            background: rgba(255, 255, 255, 0.9);
            color: #4834d4; /* 진한 보라색 글자 */
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(162, 155, 254, 0.3);
            outline: none;
            transition: all 0.3s ease;
            -webkit-appearance: none; /* 기본 화살표 숨기기 (커스텀 디자인용) */
            -moz-appearance: none;
            appearance: none;
        }

        .lang-selector select:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(162, 155, 254, 0.5);
            background: #fff;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 850px;
            width: 90%;
        }

        /* 시간과 날짜: 중간 볼드 (Semi-bold) */
        #digital-clock {
            font-size: 3.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #today-date {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 70px;
            opacity: 0.8;
        }

        #compliment {
            font-size: 2.3rem;
            font-weight: 700;
            line-height: 1.7;
            word-break: keep-all;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.03);
        }

        @media (max-width: 480px) {
            #digital-clock { font-size: 2.4rem; }
            #today-date { font-size: 1.3rem; }
            #compliment { font-size: 1.8rem; }
            .lang-selector { top: 20px; right: 20px; }
        }
    </style>
</head>
<body class="day-mode">

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KOREAN 🇰🇷</option>
            <option value="en">ENGLISH 🇺🇸</option>
            <option value="ja">JAPANESE 🇯🇵</option>
            <option value="zh">CHINESE 🇨🇳</option>
            <option value="es">SPANISH 🇪🇸</option>
            <option value="fr">FRENCH 🇫🇷</option>
            <option value="de">GERMAN 🇩🇪</option>
            <option value="pt">PORTUGUESE 🇵🇹</option>
            <option value="it">ITALIAN 🇮🇹</option>
            <option value="ru">RUSSIAN 🇷🇺</option>
            <option value="ar">ARABIC 🇸🇦</option>
            <option value="hi">HINDI 🇮🇳</option>

            <option value="th">THAI 🇹🇭</option>
            <option value="id">INDONESIAN 🇮🇩</option>

    </div>
