<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom - 매일매일 소중한 당신을 위한 오늘의 메시지</title>
    <meta name="google-site-verification" content="Lv8vn0m8j5zG1dkw8WTzH57VCQofxCsoT_sMCJ8QI_c" />
    <style>
        :root {
            --bg-day: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            --text-day: #2c3e50;
            --bg-night: linear-gradient(135deg, #1a1c2c 0%, #000000 100%);
            --text-night: #ecf0f1;
            --point-purple: #a29bfe; 
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            transition: background 1s ease, color 1s ease;
            overflow: hidden;
            position: relative;
        }

        body.day-mode { background: var(--bg-day); color: var(--text-day); }
        body.night-mode { background: var(--bg-night); color: var(--text-night); }

        /* 언어 선택기 (낮밤 대응) */
        .lang-selector {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
        }

        .lang-selector select {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.5s ease;
        }

        body.day-mode .lang-selector select {
            background-color: #ffffff;
            color: #4834d4;
            border: 2px solid var(--point-purple);
        }

        body.night-mode .lang-selector select {
            background-color: rgba(44, 62, 80, 0.7);
            color: #ecf0f1;
            border: 2px solid rgba(162, 155, 254, 0.5);
            backdrop-filter: blur(5px);
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 850px;
            width: 90%;
        }

        #top-message {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 15px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        #digital-clock {
            font-size: 3.2rem;
            font-weight: 600; 
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #today-date {
            font-size: 1.5rem;
            font-weight: 500; 
            margin-bottom: 50px;
            opacity: 0.6;
        }

        /* 명언 영역 스타일 */
        .quote-box {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #compliment {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.6;
            word-break: keep-all;
            margin-bottom: 15px;
        }

        /* 출처 스타일 */
        #author {
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0.6;
            font-style: italic;
        }

        @media (max-width: 480px) {
            #digital-clock { font-size: 2.2rem; }
            #compliment { font-size: 1.6rem; }
            #author { font-size: 0.9rem; }
        }
    </style>
</head>
<body class="day-mode">

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KOREAN 🇰🇷</option>
            <option value="en">ENGLISH 🇺🇸</option>
            <option value="ja">JAPANESE 🇯🇵</option>
            <option value="zh">CHINESE 🇨🇳</option>
            <option value="es">SPANISH 🇪🇸</option>
            <option value="fr">FRENCH 🇫🇷</option>
            <option value="de">GERMAN 🇩🇪</option>
            <option value="pt">PORTUGUESE 🇵🇹</option>
            <option value="it">ITALIAN 🇮🇹</option>
            <option value="ru">RUSSIAN 🇷🇺</option>
            <option value="ar">ARABIC 🇸🇦</option>
            <option value="hi">HINDI 🇮🇳</option>
            <option value="vi">VIETNAMESE 🇻🇳</option>
            <option value="th">THAI 🇹🇭</option>
            <option value="id">INDONESIAN 🇮🇩</option>
        </select>
    </div>

    <div class="container">
        <div id="top-message"></div>
        <div id="digital-clock">00:00:00</div>
        <div id="today-date">0000. 00. 00</div>
        
        <div class="quote-box">
            <div id="compliment">...</div>
            <div id="author"></div>
        </div>
    </div>

    <script>
        const topMessages = {
            ko: "당신은 매일 소중합니다.",
            en: "You are precious every single day.",
            ja: "あなたは毎日大切です。",
            zh: "每一天的你都很珍贵。",
            es: "Eres valioso cada día.",
            fr: "Tu es précieux chaque jour.",
            de: "Du bist jeden Tag wertvoll.",
            pt: "Você é precioso todos os dias.",
            it: "Sei prezioso ogni singolo giorno.",
            ru: "Вы драгоценны каждый день.",
            ar: "أنت ثمين في كل يوم.",
            hi: "आप हर दिन अनमोल हैं।",
            vi: "Bạn quý giá mỗi ngày.",
            th: "คุณมีค่าในทุกๆ วัน",
            id: "Anda berharga setiap hari."
        };

        // 명언 데이터 구조: { q: "명언", a: "저자" }
        const languageData = {
            ko: [
                {q: "행복은 여정이지 목적지가 아니다.", a: "알프레드 디 수자"},
                {q: "어둠 속에서도 빛을 발견하는 법을 배워라.", a: "아리스토텔레스"},
                {q: "가장 빛나는 별은 가장 어두운 밤에 보인다.", a: "고전 격언"}
            ],
            en: [
                {q: "Happiness is a journey, not a destination.", a: "Alfred D'Souza"},
                {q: "Focus to see the light in your darkest moments.", a: "Aristotle"},
                {q: "The stars shine brightest in the darkest night.", a: "Proverb"}
            ],
            ja: [
                {q: "幸せは旅路であり、目的地ではない。", a: "アルフレッド・D・スーザ"},
                {q: "最も暗い夜に、星は最も輝く。", a: "格言"},
                {q: "小さな変化の中に、真実の生がある。", a: "レフ・톨스토이"}
            ],
            // ... 다른 언어도 같은 구조({q: "", a: ""})로 추가 가능합니다.
        };

        const selectEl = document.getElementById('language-select');
        let savedLang = localStorage.getItem('userLang');
        let browserLang = navigator.language.substring(0, 2);
        let currentLang = savedLang || (languageData[browserLang] ? browserLang : 'en');
        
        selectEl.value = currentLang;

        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            
            document.getElementById('top-message').innerText = topMessages[currentLang] || topMessages['en'];
            
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}:${s}`;
            
            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit' };
            document.getElementById('today-date').innerText = now.toLocaleDateString(currentLang === 'ko' ? 'ko-KR' : 'en-US', dateOptions);

            document.body.className = (now.getHours() >= 6 && now.getHours() < 18) ? 'day-mode' : 'night-mode';

            let displayDate = new Date(now);
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            const dateSeed = (displayDate.getFullYear() * 10000) + ((displayDate.getMonth() + 1) * 100) + displayDate.getDate();
            
            const currentList = languageData[currentLang] || languageData['en'];
            const selectedQuote = currentList[dateSeed % currentList.length];
            
            // 명언과 저자 출력
            document.getElementById('compliment').innerText = selectedQuote.q;
            document.getElementById('author').innerText = `- ${selectedQuote.a}`;

            const isRtl = currentLang === 'ar';
            document.querySelector('.quote-box').style.direction = isRtl ? 'rtl' : 'ltr';
        }

        updateUI();
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
