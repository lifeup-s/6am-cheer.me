<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom - Moments of Light</title>
    <meta name="google-site-verification" content="Lv8vn0m8j5zG1dkw8WTzH57VCQofxCsoT_sMCJ8QI_c" />    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 1. 은은한 '아침' 그라데이션 배경 (채도 낮춤) */
            --bg-base: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%); 
            --dark-text: #1a1a1a;
            --pure-white: #ffffff;
        }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-base);
            color: var(--dark-text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 💡 실제 풍경 사진 배경 추가 (레퍼런스 이미지 아이디어 반영) */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 💡 레퍼런스 이미지와 유사한 자연 풍경 사진 URL */
            background-image: url("https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=1920&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            opacity: 0.15; /* 💡 가독성을 위해 매우 은은하게 배치 */
            z-index: -1;
        }

        /* 상단 메시지 (가장 중요): 얇고 간결하게 (70% 축소 버전 유지) */
        #top-message {
            margin-top: 50px;
            font-size: 0.7rem; /* 크기 축소 */
            font-weight: 300;  /* 가늘게 */
            letter-spacing: 0.2em; /* 자간을 넓혀 고급스러움 유지 */
            text-align: center;
            opacity: 0.9;
        }

        /* 메인 컨텐츠 영역 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
        }

        /* 시간 스타일: 거대하고 굵게 (900 두께) */
        #digital-clock {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 5px;
            /* 💡 실제 사진 배경 위에서 가독성 확보를 위한 텍스트 그림자 */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #today-date {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 50px;
            opacity: 0.8;
            /* 💡 가독성 확보를 위한 텍스트 그림자 */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* 가독성 최우선: 하얀색 명언 카드 */
        .quote-card {
            background-color: var(--pure-white);
            color: var(--dark-text);
            padding: 40px;
            width: 85%;
            max-width: 600px;
            border-radius: 4px;
            box-shadow: 20px 20px 0px rgba(0, 0, 0, 0.1); /* 그래픽적인 그림자 */
            text-align: left;
        }

        #compliment {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.4;
            word-break: keep-all;
            margin-bottom: 15px;
        }

        #author {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.6;
            border-top: 2px solid var(--dark-text);
            padding-top: 10px;
            display: inline-block;
        }

        /* 언어 선택기 */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-selector select {
            background: transparent;
            border: 2px solid var(--dark-text);
            color: var(--dark-text);
            padding: 5px 10px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            #top-message { font-size: 0.6rem; }
            #digital-clock { font-size: 4rem; }
            .quote-card { padding: 30px; width: 90%; }
            #compliment { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KR</option>
            <option value="en">EN</option>
            <option value="ja">JP</option>
            <option value="zh">CN</option>
            <option value="es">ES</option>
            <option value="fr">FR</option>
            <option value="de">DE</option>
        </select>
    </div>

    <div id="top-message">당신은 매일 소중합니다</div>

    <div class="main-content">
        <div id="digital-clock">00:00</div>
        <div id="today-date">2026. 03. 31</div>
        
        <div class="quote-card">
            <div id="compliment">Loading Wisdom...</div>
            <div id="author"></div>
        </div>
    </div>

    <script>
        const topMessages = {
            ko: "당신은 매일 소중합니다",
            en: "YOU ARE PRECIOUS EVERY DAY",
            ja: "あなたは毎日大切です",
            zh: "每一天的你都很珍贵",
            es: "ERES VALIOSO CADA DÍA",
            fr: "TU ES PRÉCIEUX CHAQUE JOUR",
            de: "DU BIST JEDEN TAG WERTVOLL"
        };

        const languageData = {
            ko: [
                {q: "가장 빛나는 별은 어두운 밤에 보인다.", a: "고전 격언"},
                {q: "행복은 여정이지 목적지가 아니다.", a: "알프레드 디 수자"},
                {q: "어둠 속에서도 빛을 발견하는 법을 배워라.", a: "아리스토텔레스"}
            ],
            en: [
                {q: "Stars shine brightest in the dark.", a: "Proverb"},
                {q: "Happiness is a journey, not a destination.", a: "Alfred D'Souza"},
                {q: "Find light in your darkest moments.", a: "Aristotle"}
            ],
            ja: [
                {q: "最も暗い夜に星は輝く。", a: "格言"},
                {q: "幸せは旅路であり、目的地ではない。", a: "アルフレッド・D・スーザ"}
            ],
            zh: [
                {q: "最亮的星出现在最暗의夜里。", a: "格言"},
                {q: "幸福是旅程，而非终点。", a: "阿尔弗雷德·德索萨"}
            ]
            // ... (나머지 15개국어 데이터 동일 구조 적용)
        };

        const selectEl = document.getElementById('language-select');
        let currentLang = localStorage.getItem('userLang') || 
                          (languageData[navigator.language.substring(0, 2)] ? navigator.language.substring(0, 2) : 'ko');
        selectEl.value = currentLang;

        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            // 상단 메시지
            document.getElementById('top-message').innerText = topMessages[currentLang] || topMessages['en'];
            
            // 거대하고 굵은 시계 (분까지만 표시)
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${h}:${m}`;
            
            // 날짜
            document.getElementById('today-date').innerText = now.getFullYear() + ". " + 
                                                              String(now.getMonth()+1).padStart(2, '0') + ". " + 
                                                              String(now.getDate()).padStart(2, '0');

            // 명언 로직
            let displayDate = new Date(now);
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            const dateSeed = (displayDate.getFullYear() * 10000) + ((displayDate.getMonth() + 1) * 100) + displayDate.getDate();
            
            const list = languageData[currentLang] || languageData['en'];
            const item = list[dateSeed % list.length];
            
            document.getElementById('compliment').innerText = item.q;
            document.getElementById('author').innerText = item.a;
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
