<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom</title>
    <meta name="google-site-verification" content="Lv8vn0m8j5zG1dkw8WTzH57VCQofxCsoT_sMCJ8QI_c" />    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 레퍼런스의 상징적인 그린 컬러 */
            --point-green: #66cc33; 
            --pure-white: #ffffff;
            --dark-text: #1a1a1a;
        }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            /* 전체 배경을 레퍼런스의 그린으로 설정 */
            background-color: var(--point-green);
            color: var(--pure-white);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 상단 메시지: 얇고 간결하게 (요청하신 70% 수준) */
        #top-message {
            margin-top: 50px;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-align: center;
            opacity: 0.9;
        }

        /* 메인 컨텐츠 영역 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        /* 시간: 굵고 명확하게 */
        #digital-clock {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 5px;
        }

        #today-date {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* 💡 가독성 핵심: 레퍼런스의 화이트 박스 레이아웃 반영 */
        .quote-card {
            background-color: var(--pure-white);
            color: var(--point-green); /* 글자색을 배경색인 그린으로 설정해 강렬한 대비 */
            padding: 40px 50px;
            width: 85%;
            max-width: 600px;
            border-radius: 4px; /* 모던한 직선 느낌 */
            box-shadow: 20px 20px 0px rgba(0, 0, 0, 0.1); /* 그래픽적인 그림자 */
            text-align: left; /* 레퍼런스의 포스터 느낌 */
        }

        #compliment {
            font-size: 1.8rem;
            font-weight: 900; /* 본문도 힘있게 */
            line-height: 1.4;
            word-break: keep-all;
            margin-bottom: 15px;
        }

        #author {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.7;
            border-top: 2px solid var(--point-green);
            padding-top: 10px;
            display: inline-block;
        }

        /* 언어 선택기 */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-selector select {
            background: transparent;
            border: 2px solid var(--pure-white);
            color: var(--pure-white);
            padding: 5px 10px;
            font-weight: 700;
            border-radius: 0;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            #digital-clock { font-size: 4rem; }
            .quote-card { padding: 30px; }
            #compliment { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="lang-selector">
        <select id="language-select">
            <option value="ko">KR</option>
            <option value="en">EN</option>
            <option value="ja">JP</option>
            <option value="zh">CN</option>
            <option value="es">ES</option>
            <option value="fr">FR</option>
            <option value="de">DE</option>
        </select>
    </div>

    <div id="top-message">당신은 매일 소중합니다</div>

    <div class="main-content">
        <div id="digital-clock">00:00</div>
        <div id="today-date">2026. 03. 31</div>
        
        <div class="quote-card">
            <div id="compliment">...</div>
            <div id="author"></div>
        </div>
    </div>

    <script>
        const topMessages = {
            ko: "당신은 매일 소중합니다",
            en: "YOU ARE PRECIOUS EVERY DAY",
            ja: "あなたは毎日大切です",
            zh: "每一天的你都很珍贵",
            es: "ERES VALIOSO CADA DÍA",
            fr: "TU ES PRÉCIEUX CHAQUE JOUR",
            de: "DU BIST JEDEN TAG WERTVOLL"
        };

        const languageData = {
            ko: [
                {q: "가장 빛나는 별은 어두운 밤에 보인다.", a: "고전 격언"},
                {q: "행복은 여정이지 목적지가 아니다.", a: "알프레드 디 수자"},
                {q: "어둠 속에서도 빛을 발견하는 법을 배워라.", a: "아리스토텔레스"}
            ],
            en: [
                {q: "Stars shine brightest in the dark.", a: "Proverb"},
                {q: "Happiness is a journey, not a destination.", a: "Alfred D'Souza"},
                {q: "Find light in your darkest moments.", a: "Aristotle"}
            ],
            ja: [
                {q: "最も暗い夜に星は輝く。", a: "格言"},
                {q: "幸せは旅路であり、目的地ではない。", a: "アルフレッド・D・スーザ"}
            ]
            // ... (나머지 15개국어 데이터 동일 구조 적용)
        };

        const selectEl = document.getElementById('language-select');
        let currentLang = localStorage.getItem('userLang') || 'ko';
        selectEl.value = currentLang;

        selectEl.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('userLang', currentLang);
            updateUI();
        });

        function updateUI() {
            const now = new Date();
            document.getElementById('top-message').innerText = topMessages[currentLang] || topMessages['en'];
            document.getElementById('digital-clock').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('today-date').innerText = now.toLocaleDateString('ko-KR').replace(/\//g, '. ');

            let displayDate = new Date(now);
            if (now.getHours() < 6) displayDate.setDate(now.getDate() - 1);
            const dateSeed = (displayDate.getFullYear() * 10000) + ((displayDate.getMonth() + 1) * 100) + displayDate.getDate();
            
            const list = languageData[currentLang] || languageData['en'];
            const item = list[dateSeed % list.length];
            
            document.getElementById('compliment').innerText = item.q;
            document.getElementById('author').innerText = item.a;
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
